- defaults:
      link:
          relink: true
          create: true
- clean: ["~", "~/bin"]
- link:
      ~/.gemini: gemini
      ~/.skills: skills
      ~/.config/alacritty: alacritty
      ~/.zshrc: .zshrc
      ~/bin:
          glob: true
          path: scripts/*
          relink: true
      ~/.dotfiles: ""
      ~/.bashrc: .bashrc
      ~/.profile: .profile
      ~/.hushlogin: .hushlogin
      ~/.cargo/:
          glob: true
          path: cargo/*
          relink: true
      ~/.gitconfig: .gitconfig
      /etc/mpd.conf: mpd.conf
      ~/.config/zed: zed
      ~/.config/mise: mise
      ~/.config/opencode: opencode
      ~/.local/share/cantata/mpd/mpd.conf: mpd.conf
- shell:
      - command: git submodule sync --recursive
        stdout: true
      - command: bash ./dconf.sh
        stdout: true
